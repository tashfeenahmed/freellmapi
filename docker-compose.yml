services:
  freellmapi:
    image: freellmapi
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - ./server/data:/app/server/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
