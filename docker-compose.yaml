services:
  freellmapi:
    build: .
    restart: unless-stopped
    init: true
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_PATH: /app/data/freellmapi.sqlite
    volumes:
      - freellmapi_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3001/api/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  freellmapi_data:
