worker_processes 1;
error_log /home/ubuntu/llmapi/deploy/runtime/nginx/acme-error.log warn;
pid /home/ubuntu/llmapi/deploy/runtime/nginx/acme-nginx.pid;

events {
    worker_connections 32;
}

http {
    server_tokens off;
    access_log off;

    server {
        listen 80;
        listen [::]:80;
        server_name llm.nalits.com;

        location /.well-known/acme-challenge/ {
            root /var/www/llmapi-acme;
            default_type text/plain;
        }

        location / {
            return 204;
        }
    }
}
