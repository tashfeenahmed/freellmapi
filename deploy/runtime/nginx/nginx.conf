worker_processes 1;
error_log /home/ubuntu/llmapi/deploy/runtime/nginx/error.log warn;
pid /home/ubuntu/llmapi/deploy/runtime/nginx/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    access_log /home/ubuntu/llmapi/deploy/runtime/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream llmapi {
        server 127.0.0.1:3001;
        keepalive 4;
    }

    include /home/ubuntu/llmapi/deploy/runtime/nginx/sites/*.conf;
}
