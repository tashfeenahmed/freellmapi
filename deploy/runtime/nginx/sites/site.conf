server {
    listen 80;
    listen [::]:80;
    server_name llm.nalits.com;

    location /.well-known/acme-challenge/ {
        root /var/www/llmapi-acme;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name llm.nalits.com;

    ssl_certificate     /etc/letsencrypt/live/llm.nalits.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.nalits.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:LLMSSL:1m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://llmapi;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
